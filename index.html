<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mentalhealth-GPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-black text-white font-sans">
    <header class="p-4 border-b border-gray-700 flex justify-between items-center">
      <div class="text-xl font-bold flex items-center gap-2">
        <!-- Optional Logo -->
        <img src="https://via.placeholder.com/40x40" alt="Logo" class="w-10 h-10 rounded-full" />
        mentalhealth-GPT
      </div>
      <nav class="space-x-4 text-sm">
        <a href="#" class="hover:underline">Home</a>
        <a href="#" class="hover:underline">Upload</a>
        <a href="#" class="hover:underline">Team</a>
        <a href="#" class="hover:underline">Kontakt</a>
      </nav>
    </header>

    <main class="max-w-2xl mx-auto mt-20 px-4 text-center">
      <h1 class="text-3xl font-bold mb-6">Verschlüsselter Upload deiner Datei</h1>
      <p class="mb-8 text-gray-400">Lade deine Audio-Datei sicher und verschlüsselt hoch.</p>

      <form id="uploadForm" class="space-y-4">
        <input type="file" id="fileInput" class="bg-gray-800 border border-gray-600 p-2 rounded w-full text-white" />
        <button
          type="button"
          onclick="alert('Verschlüsselung kommt bald!')"
          class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white font-semibold"
        >
          Upload starten
        </button>
      </form>
    </main>

    <footer class="mt-20 text-center text-gray-600 text-sm p-4">
      © 2025 mentalhealth-GPT. Alle Rechte vorbehalten.
    </footer>
  </body>
</html>
